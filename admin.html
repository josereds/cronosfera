<!doctype html>
<html lang="es-CO">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14161c">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin · Cronosfera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           oklch(14% 0.008 250);
      --bg-warm:      oklch(17% 0.010 250);
      --surface:      oklch(20% 0.010 250);
      --surface-2:    oklch(24% 0.012 250);
      --fg:           oklch(96% 0.005 80);
      --fg-soft:      oklch(82% 0.005 80);
      --muted:        oklch(60% 0.008 80);
      --muted-2:      oklch(48% 0.008 80);
      --border:       oklch(30% 0.008 250);
      --border-soft:  oklch(24% 0.006 250);
      --accent:       oklch(78% 0.10 75);
      --accent-deep:  oklch(68% 0.12 70);
      --accent-soft:  oklch(28% 0.06 70);
      --danger:       oklch(64% 0.18 25);
      --success:      oklch(70% 0.12 155);
      --info:         oklch(70% 0.10 230);
      --warning:      oklch(80% 0.13 80);
      --font-display: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
      --font-body:    'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, Menlo, monospace;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow:    0 8px 30px rgba(0,0,0,.4);
      --shadow-lg: 0 30px 80px rgba(0,0,0,.55);
      --r-sm: 4px;
      --r:    8px;
      --r-lg: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font: 400 14px/1.55 var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; color: inherit; background: none; border: 0; }
    input, select, textarea { font: inherit; color: inherit; }
    ::selection { background: var(--accent); color: var(--bg); }
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .small { font-size: 12px; }
    .accent { color: var(--accent); }

    /* ===== Layout ===== */
    .admin-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    @media (max-width: 980px) { .admin-shell { grid-template-columns: 1fr; } }

    /* ===== Sidebar ===== */
    .sidebar {
      background: var(--bg-warm);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
    }
    @media (max-width: 980px) { .sidebar { position: relative; height: auto; } }
    .sidebar .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-display);
      font-size: 24px; font-weight: 600;
      padding: 0 12px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar .logo .logo-img {
      height: 34px; width: auto; display: block; flex-shrink: 0;
    }
    .sidebar .logo .badge {
      font-family: var(--font-body);
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent);
      padding: 3px 8px;
      background: var(--accent-soft);
      border-radius: 4px;
      margin-left: auto;
    }
    .nav-section { padding: 12px 0; }
    .nav-section + .nav-section { border-top: 1px solid var(--border-soft); }
    .nav-section .label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted-2);
      padding: 0 12px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: var(--r);
      color: var(--fg-soft);
      font-size: 13px; font-weight: 500;
      transition: all .15s;
      position: relative;
    }
    .nav-item:hover { background: var(--surface); color: var(--fg); }
    .nav-item.active { background: var(--surface-2); color: var(--accent); }
    .nav-item.active::before {
      content: ""; position: absolute; left: -16px; top: 6px; bottom: 6px;
      width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-item .count {
      margin-left: auto;
      font-size: 10px; font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
    }
    .nav-item .count.warn { background: color-mix(in oklab, var(--danger) 22%, transparent); color: oklch(82% 0.16 25); }
    .sidebar-foot {
      margin-top: auto;
      padding: 16px 12px 0;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted-2);
    }
    .sidebar-foot strong { color: var(--success); }

    /* ===== Main ===== */
    .main { padding: 0; min-width: 0; }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; gap: 20px;
      padding: 16px 28px;
      background: rgba(20,22,28,.86);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-bottom: 1px solid var(--border);
    }
    .topbar h1 {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 500;
      letter-spacing: -0.01em;
    }
    .topbar .header-actions { margin-left: auto; display: flex; align-items: center; gap: 14px; }

    .content { padding: 32px 28px 80px; }

    /* ===== Session chip (reutiliza cronos-auth) ===== */
    [data-session-slot] .auth-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px; border: 1px solid var(--border);
      border-radius: var(--r); font-size: 13px; font-weight: 500;
    }
    [data-session-slot] .auth-link:hover { border-color: var(--accent); color: var(--accent); }
    .session-chip {
      position: relative; display: inline-flex; align-items: center; gap: 10px;
      padding: 6px 8px 6px 6px; border: 1px solid var(--border);
      border-radius: 999px; cursor: pointer; transition: border-color .2s;
    }
    .session-chip:hover, .session-chip.open { border-color: var(--accent); }
    .session-chip .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .session-chip .name { font-size: 13px; font-weight: 500; line-height: 1.2; }
    .session-chip .role { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .session-menu {
      position: absolute; top: calc(100% + 8px); right: 0;
      min-width: 200px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      box-shadow: var(--shadow-lg); padding: 8px;
      opacity: 0; visibility: hidden; transform: translateY(-4px);
      transition: opacity .15s, transform .15s, visibility .15s;
    }
    .session-chip.open .session-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .session-menu .mini-link {
      display: block; padding: 9px 12px; font-size: 13px;
      border-radius: 6px; transition: background .15s; width: 100%; text-align: left;
    }
    .session-menu .mini-link:hover { background: var(--surface-2); }
    .session-menu .mini-link.danger:hover { background: color-mix(in oklab, var(--danger) 12%, transparent); color: oklch(82% 0.14 25); }

    /* ===== Tabs ===== */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* ===== Stat cards ===== */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent);
    }
    .stat-card.danger::before { background: var(--danger); }
    .stat-card.info::before { background: var(--info); }
    .stat-card.success::before { background: var(--success); }
    .stat-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .stat-value { font-family: var(--font-display); font-size: 44px; font-weight: 500; line-height: 1; margin: 8px 0 4px; }
    .stat-hint { font-size: 12px; color: var(--fg-soft); }

    /* ===== Dash cols ===== */
    .dash-cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px; }
    @media (max-width: 980px) { .dash-cols { grid-template-columns: 1fr; } }
    .dash-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px;
    }
    .dash-panel h3 { font-family: var(--font-display); font-size: 20px; font-weight: 500; margin-bottom: 16px; }
    .empty-inline { color: var(--muted); font-size: 13px; padding: 12px 0; }

    /* ===== Control Center ===== */
    .admin-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, .65fr);
      gap: 22px;
      margin-bottom: 26px;
    }
    .hero-panel,
    .ops-panel,
    .action-card,
    .health-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
    }
    .hero-panel {
      padding: 26px;
      position: relative;
      overflow: hidden;
      min-height: 190px;
    }
    .hero-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(520px 280px at 88% 0%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 70%),
        linear-gradient(135deg, color-mix(in oklab, var(--surface-2) 45%, transparent), transparent);
      pointer-events: none;
    }
    .hero-panel > * { position: relative; }
    .hero-panel .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hero-panel h2 {
      font-family: var(--font-display);
      font-size: clamp(34px, 4vw, 54px);
      font-weight: 500;
      line-height: .98;
      letter-spacing: -.02em;
      max-width: 680px;
      margin-bottom: 14px;
    }
    .hero-panel p {
      color: var(--fg-soft);
      max-width: 650px;
      font-size: 14px;
    }
    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    .ops-panel { padding: 22px; }
    .ops-panel h3,
    .health-card h3,
    .action-card h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .ops-list { display: grid; gap: 12px; }
    .ops-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border-soft);
      border-radius: var(--r);
      background: var(--bg-warm);
    }
    .ops-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: var(--r);
      background: var(--accent-soft);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
    }
    .ops-title { font-weight: 600; }
    .ops-sub { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .ops-value { color: var(--accent); font-family: var(--font-mono); font-size: 12px; white-space: nowrap; }
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin: 26px 0;
    }
    .action-card {
      padding: 18px;
      text-align: left;
      transition: transform .18s, border-color .18s, background .18s;
    }
    .action-card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in oklab, var(--accent) 42%, var(--border));
      background: color-mix(in oklab, var(--accent) 8%, var(--surface));
    }
    .action-card .icon {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: var(--r);
      background: var(--accent-soft);
      color: var(--accent);
      margin-bottom: 14px;
    }
    .action-card p { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .health-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 24px;
      margin-top: 24px;
    }
    .health-card { padding: 22px; }
    .metric-list { display: grid; gap: 12px; }
    .metric-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-soft);
    }
    .metric-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .metric-row strong { display: block; font-weight: 600; }
    .metric-row span { color: var(--muted); font-size: 12px; }
    .metric-value { color: var(--accent); font-family: var(--font-mono); font-size: 13px; white-space: nowrap; }
    .inventory-list { display: grid; gap: 10px; }
    .inventory-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .inventory-item:last-child { border-bottom: 0; }
    .inventory-item .name { font-weight: 600; }
    .inventory-item .ref { color: var(--muted); font-family: var(--font-mono); font-size: 11px; margin-top: 1px; }
    .admin-mini-chart {
      height: 92px;
      display: flex;
      align-items: end;
      gap: 7px;
      padding-top: 8px;
    }
    .admin-mini-chart span {
      flex: 1;
      min-width: 10px;
      border-radius: 5px 5px 0 0;
      background: linear-gradient(180deg, var(--accent), color-mix(in oklab, var(--accent) 35%, var(--surface-2)));
      box-shadow: 0 -10px 28px color-mix(in oklab, var(--accent) 12%, transparent);
    }
    .mobile-admin-nav { display: none; }

    /* ===== Tables ===== */
    .admin-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left; padding: 14px 18px;
      background: var(--bg-warm);
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: 0; }
    .admin-table tr:hover td { background: color-mix(in oklab, var(--surface-2) 50%, transparent); }
    .admin-table td.actions { text-align: right; white-space: nowrap; }
    .row-meta { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }
    .empty-row { text-align: center; color: var(--muted); padding: 40px; }

    /* Miniatura de producto/subasta en tablas admin */
    .admin-table td.thumb-cell { width: 56px; padding: 8px 0 8px 18px; }
    .admin-thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; background: var(--bg-warm);
      border: 1px solid var(--border-soft); display: block;
    }
    .admin-thumb.placeholder {
      display: grid; place-items: center;
      color: var(--muted-2); font-size: 18px;
    }
    /* ===== Catálogo por carpetas de marca ===== */
    .brand-folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .brand-folder {
      display: flex; flex-direction: column; text-align: left;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); overflow: hidden; cursor: pointer;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .brand-folder:hover {
      transform: translateY(-3px);
      border-color: color-mix(in oklab, var(--accent) 50%, var(--border));
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    .brand-folder-cover {
      position: relative; aspect-ratio: 16/10; background: var(--bg-warm);
      display: grid; place-items: center; overflow: hidden;
    }
    .brand-folder-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
    .brand-folder:hover .brand-folder-cover img { transform: scale(1.05); }
    .brand-folder-ph { color: var(--muted-2); font-size: 30px; }
    .brand-folder-count {
      position: absolute; top: 10px; right: 10px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      background: rgba(10,11,14,.62); color: #fff;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      padding: 3px 9px; border-radius: 999px;
    }
    .brand-folder-body {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 15px;
    }
    .brand-folder-body svg { width: 15px; height: 15px; color: var(--accent); flex-shrink: 0; }
    .brand-folder-name { font-size: 15px; font-weight: 600; color: var(--fg); }

    /* Barra de "volver" dentro de una carpeta */
    .folder-bar {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
    }
    .folder-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      padding: 8px 12px; border-radius: var(--r);
      border: 1px solid var(--border); background: var(--surface);
      transition: all .15s;
    }
    .folder-back:hover { color: var(--fg); border-color: var(--fg-soft); }
    .folder-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
    .folder-title .count { font-family: var(--font-mono); font-size: 13px; color: var(--muted); margin-left: 8px; }

    /* Cuadrícula de productos dentro de una carpeta / resultados de búsqueda */
    .admin-prod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }
    .admin-prod-card {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); overflow: hidden;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .admin-prod-card:hover { border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); box-shadow: 0 14px 32px rgba(0,0,0,.3); }
    .admin-prod-cover {
      position: relative; aspect-ratio: 4/3; background: var(--bg-warm);
      display: grid; place-items: center; overflow: hidden;
    }
    .admin-prod-cover img { width: 100%; height: 100%; object-fit: cover; }
    .admin-prod-ph { color: var(--muted-2); font-size: 26px; }
    .admin-prod-cover .stock-pill { position: absolute; top: 8px; left: 8px; }
    .admin-prod-body { padding: 13px 15px 6px; flex: 1; }
    .admin-prod-model { font-size: 14px; font-weight: 600; color: var(--fg); line-height: 1.25; }
    .admin-prod-ref { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .admin-prod-prices { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 8px; align-items: baseline; }
    .admin-prod-prices .pr { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--fg); }
    .admin-prod-prices .wpr { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }
    .admin-prod-actions {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 15px 14px;
    }
    .admin-prod-actions .btn-ghost {
      flex: 1; padding: 8px; font-size: 13px; text-align: center;
      border: 1px solid var(--border); border-radius: var(--r);
      transition: all .15s;
    }
    .admin-prod-actions .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .catalog-count { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    .icon-action {
      display: inline-grid; place-items: center;
      width: 30px; height: 30px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 16px; line-height: 1;
      transition: all .15s;
      margin-left: 4px;
    }
    .icon-action:hover { background: var(--surface-2); color: var(--fg); }
    .icon-action.delete:hover { background: color-mix(in oklab, var(--danger) 18%, transparent); color: oklch(85% 0.16 25); }
    .icon-action.close:hover { background: color-mix(in oklab, var(--warning) 18%, transparent); color: var(--warning); }

    /* ===== Pills ===== */
    .stock-pill, .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      letter-spacing: .04em;
    }
    .stock-pill.in { background: color-mix(in oklab, var(--success) 14%, transparent); color: oklch(82% 0.10 155); }
    .stock-pill.low { background: color-mix(in oklab, var(--warning) 18%, transparent); color: var(--warning); }
    .stock-pill.out { background: var(--surface-2); color: var(--muted); }
    .status-pill.live, .status-pill.pending, .status-pill.approved { background: color-mix(in oklab, var(--success) 14%, transparent); color: oklch(82% 0.10 155); }
    .status-pill.live { background: color-mix(in oklab, var(--danger) 18%, transparent); color: oklch(85% 0.16 25); }
    .status-pill.scheduled, .status-pill.pending { background: color-mix(in oklab, var(--info) 14%, transparent); color: oklch(82% 0.10 230); }
    .status-pill.closed, .status-pill.rejected, .status-pill.suspended { background: var(--surface-2); color: var(--muted); }

    /* ===== Catalogo head ===== */
    .catalogo-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .catalogo-search input {
      width: 320px; max-width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 11px 14px;
      border-radius: var(--r);
      color: var(--fg);
    }
    .catalogo-search input:focus { outline: none; border-color: var(--accent); }
    .page-desc { color: var(--muted); max-width: 600px; font-size: 14px; }

    /* ===== Buttons ===== */
    .btn-primary {
      padding: 11px 18px;
      background: var(--accent); color: var(--bg);
      font-weight: 600; border-radius: var(--r);
      letter-spacing: 0.01em; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 18px color-mix(in oklab, var(--accent) 22%, transparent);
    }
    .btn-primary:hover { background: var(--accent-deep); }
    .btn-ghost {
      padding: 11px 18px;
      background: transparent; color: var(--fg-soft);
      border: 1px solid var(--border); border-radius: var(--r);
      font-weight: 500; transition: all .2s;
    }
    .btn-ghost:hover { background: var(--surface); color: var(--fg); }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      opacity: 0; transition: opacity .2s;
    }
    .modal-overlay.in { opacity: 1; }
    .modal {
      width: 100%; max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      transform: translateY(20px);
      transition: transform .2s;
    }
    .modal-overlay.in .modal { transform: translateY(0); }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h3 { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 22px; color: var(--muted);
      display: grid; place-items: center;
      transition: all .15s;
    }
    .modal-close:hover { background: var(--surface-2); color: var(--fg); }
    .modal form { padding: 22px 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 600px) { .form-grid, .form-grid.three { grid-template-columns: 1fr; } }
    .modal label { display: block; margin-bottom: 12px; }
    .modal label span, .form-grid label span, .config-form label span {
      display: block; font-size: 11px; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .modal label.block { display: block; }
    .modal input, .modal select, .modal textarea,
    .config-form input, .config-form textarea, .config-form select {
      width: 100%;
      background: var(--bg-warm);
      border: 1px solid var(--border);
      padding: 11px 14px;
      border-radius: var(--r);
      color: var(--fg);
      transition: border-color .2s, box-shadow .2s;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus,
    .config-form input:focus, .config-form textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
    }
    .modal textarea { font-family: var(--font-body); resize: vertical; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-soft); }
    .form-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* ===== Requests ===== */
    .req-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
    .req-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .req-card.pending { border-color: color-mix(in oklab, var(--info) 40%, var(--border)); }
    .req-card.approved { border-color: color-mix(in oklab, var(--success) 40%, var(--border)); }
    .req-card.rejected { border-color: color-mix(in oklab, var(--danger) 40%, var(--border)); }
    .req-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .req-card-head strong { font-size: 16px; font-weight: 500; }
    .req-card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px 0; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
    .req-card-meta span { display: block; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .req-card-meta strong { font-size: 13px; font-weight: 500; }
    .req-card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; }
    .temp-pwd { flex: 1; min-width: 140px; }
    .temp-pwd input { padding: 9px 12px; font-size: 13px; }
    .req-card-foot { font-size: 13px; padding: 10px 12px; border-radius: var(--r); }
    .req-card-foot.success { background: color-mix(in oklab, var(--success) 12%, transparent); color: oklch(82% 0.10 155); }
    .req-card-foot.danger { background: color-mix(in oklab, var(--danger) 12%, transparent); color: oklch(85% 0.16 25); }

    /* ===== Req list (dashboard) ===== */
    .req-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .req-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border-soft);
    }
    .req-list li:last-child { border-bottom: 0; }

    /* ===== Empty state ===== */
    .empty-state {
      padding: 60px 24px; text-align: center;
      background: var(--surface); border: 1px dashed var(--border); border-radius: var(--r-lg);
    }
    .empty-state h3 { font-family: var(--font-display); font-size: 22px; font-weight: 500; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); max-width: 420px; margin: 0 auto; font-size: 14px; }
    .empty-state a { color: var(--accent); }

    /* ===== Role select ===== */
    .role-select {
      background: var(--bg-warm); border: 1px solid var(--border);
      padding: 6px 10px; border-radius: var(--r);
      font-size: 12px; color: var(--fg);
    }
    .role-select:focus { outline: none; border-color: var(--accent); }

    /* ===== Config ===== */
    .config-form fieldset {
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px;
      margin-bottom: 20px;
    }
    .config-form legend {
      font-family: var(--font-display);
      font-size: 18px;
      padding: 0 10px;
      color: var(--accent);
    }
    .config-form label { display: block; margin-bottom: 12px; }
    .config-form label.block { display: block; }
    .form-actions { display: flex; justify-content: flex-end; }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--info);
      color: var(--fg);
      padding: 14px 18px;
      border-radius: var(--r);
      box-shadow: var(--shadow-lg);
      font-size: 13px; font-weight: 500;
      max-width: 360px;
      transform: translateX(100%);
      transition: transform .3s ease;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-left-color: var(--success); }
    .toast.danger { border-left-color: var(--danger); }
    .toast.info { border-left-color: var(--info); }

    /* ===== Responsive ===== */
    @media (max-width: 980px) {
      .sidebar { display: none; }
      .admin-shell { grid-template-columns: 1fr; }
      .topbar {
        padding: 13px 16px;
        gap: 12px;
      }
      .topbar h1 {
        font-size: 24px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .topbar .header-actions { gap: 8px; }
      .topbar .session-chip .meta,
      .topbar [data-session-slot] .auth-link span {
        display: none;
      }
      .topbar .session-chip,
      .topbar [data-session-slot] .auth-link {
        width: 38px;
        height: 38px;
        padding: 0;
        justify-content: center;
      }
      .mobile-admin-nav {
        position: sticky;
        top: 65px;
        z-index: 25;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 10px 14px;
        background: rgba(20,22,28,.92);
        border-bottom: 1px solid var(--border);
        scrollbar-width: none;
      }
      .mobile-admin-nav::-webkit-scrollbar { display: none; }
      .mobile-admin-tab {
        flex: 0 0 auto;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--fg-soft);
        font-size: 12px;
        font-weight: 600;
        background: var(--surface);
      }
      .mobile-admin-tab.active {
        color: var(--bg);
        background: var(--accent);
        border-color: var(--accent);
      }
      .content { padding: 18px 14px 96px; }
      .admin-hero,
      .health-grid,
      .dash-cols {
        grid-template-columns: 1fr;
      }
      .hero-panel { padding: 22px; min-height: auto; }
      .hero-actions .btn-primary,
      .hero-actions .btn-ghost {
        flex: 1 1 160px;
        justify-content: center;
      }
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .stat-card { padding: 16px; }
      .stat-value { font-size: 34px; }
      .admin-table-wrap { overflow-x: auto; }
      .admin-table { min-width: 720px; }
      .req-grid { grid-template-columns: 1fr; }
      .req-card-meta { grid-template-columns: 1fr; }
      .modal-overlay { padding: 18px 12px; }
      .modal { max-width: 100%; }
      .modal-actions {
        flex-direction: column-reverse;
      }
      .modal-actions .btn-primary,
      .modal-actions .btn-ghost {
        width: 100%;
        justify-content: center;
      }
    }
    @media (max-width: 560px) {
      .stat-grid { grid-template-columns: 1fr; }
      .action-grid { grid-template-columns: 1fr; }
      .ops-item { grid-template-columns: 34px minmax(0, 1fr); }
      .ops-value { grid-column: 2; justify-self: start; }
    }
  </style>
</head>

      <div class="nav-section">

          Configuración
        </a>
        <a href="#" class="nav-item" id="viewSite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4m4-16 4 4-4 4m4-4H9" stroke-linecap="round" stroke-linejoin="round"/></svg>

      <div class="sidebar-foot">

    <!-- Main -->
    <div class="main">

        <button class="mobile-admin-tab" data-tab="pedidos">Pedidos</button>
        <button class="mobile-admin-tab" data-tab="mayoristas">Mayoristas</button>
